# AquaPure — production static frontend + API proxy
#
# Use after building the frontend on EC2:
#   cd frontend && npm ci && npm run build
#   sudo mkdir -p /var/www/aquapure
#   sudo cp -r dist /var/www/aquapure/frontend/
#
# Enable instead of aquapure.conf when serving compiled assets (recommended for production).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

upstream aquapure_backend {
    server 127.0.0.1:5001;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /var/www/aquapure/frontend/dist;
    index index.html;

    access_log /var/log/nginx/aquapure-access.log;
    error_log  /var/log/nginx/aquapure-error.log warn;

    client_max_body_size 10m;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65s;

    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        application/javascript
        application/json
        image/svg+xml
        text/css
        text/plain;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location /api/ {
        proxy_pass http://aquapure_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
    }

    location = /health {
        proxy_pass http://aquapure_backend/health;
        access_log off;
    }

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
