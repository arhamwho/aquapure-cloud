# AquaPure Water Treatment Cloud — Nginx reverse proxy (AWS EC2)
#
# Routes:
#   /       → frontend (127.0.0.1:5173 Docker / Vite)
#   /api/*  → backend  (127.0.0.1:5001 Express)
#   /health → backend health check (ALB / monitoring)
#
# Install on Ubuntu 26.04 LTS EC2:
#   sudo apt update && sudo apt install -y nginx
#   sudo cp nginx/aquapure.conf /etc/nginx/sites-available/aquapure
#   sudo ln -sf /etc/nginx/sites-available/aquapure /etc/nginx/sites-enabled/aquapure
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Prerequisites:
#   docker compose up -d   (frontend :5173, backend :5001)
#   EC2 security group: allow inbound TCP 80 (and 443 if using TLS later)
#   Restrict 5173/5001 to localhost only — public traffic should hit Nginx on :80
#
# Frontend API calls must use same origin (e.g. baseURL "" or "/api" parent).
# See frontend/.env.production with VITE_API_URL="" for production builds.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

upstream aquapure_backend {
    server 127.0.0.1:5001;
    keepalive 32;
}

upstream aquapure_frontend {
    server 127.0.0.1:5173;
    keepalive 16;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Replace with your domain when available, e.g. aquapure.example.com
    # server_name aquapure.example.com;

    access_log /var/log/nginx/aquapure-access.log;
    error_log  /var/log/nginx/aquapure-error.log warn;

    client_max_body_size 10m;
    client_body_timeout  60s;
    sendfile             on;
    tcp_nopush           on;
    tcp_nodelay          on;
    keepalive_timeout    65s;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        application/javascript
        application/json
        application/xml
        image/svg+xml
        text/css
        text/javascript
        text/plain;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Backend API
    location /api/ {
        proxy_pass http://aquapure_backend;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # Health check (CloudWatch, ALB, monitor.sh)
    location = /health {
        proxy_pass http://aquapure_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # React dashboard (Vite dev server or preview behind Docker)
    location / {
        proxy_pass http://aquapure_frontend;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
